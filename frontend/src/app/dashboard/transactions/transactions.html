<div class="transactions-page">

  
  <!-- TOP CARDS -->
  <div class="cards">
    <div class="card green">
      <p>Total Balance</p>
      <h3>₹{{ totalBalance }}</h3>
    </div>

    <div class="card blue">
      <p>Total Income</p>
      <h3>₹{{ totalIncome }}</h3>
    </div>

    <div class="card red">
      <p>Total Expenses</p>
      <h3>₹{{ totalExpenses }}</h3>
    </div>
  </div>

  <!-- SEARCH + FILTER -->
  <div class="filters">
    <input type="text" placeholder="Search transactions..." />
    <select>
      <option>All types</option>
      <option>Credit</option>
      <option>Debit</option>
    </select>

      <select>
    <option>All status</option>
    <option>Completed</option>
    <option>Pending</option>
    <option>Failed</option>
  </select>

  
      <select>
    <option>Month</option>
    <option>This month</option>
    <option>Last 7 days</option>
    <option>This 3 Months</option>
    <option>Custom range</option>
  </select>

  </div>


  <div class="transaction-header">
    <div>Transaction</div>
    <div>Type</div>
    <div>Amount</div>
    <div>Status</div>
  </div>
  
  <!-- TRANSACTION LIST -->
  <div class="transaction-item" *ngFor="let t of transactions">

  <!-- Left -->
  <div class="left">
    <p class="title">{{ t.name }}</p>
    <span class="date">{{ t.date }}</span>
  </div>

  <!-- Type -->
  <div class="type">
    {{ t.type }}
  </div>

  <!-- Amount -->
  <div class="amount"
       [class.green]="t.type === 'credit'"
       [class.red]="t.type === 'debit'">
    ₹{{ t.amount }}
  </div>

  <!-- Status -->
  <div class="status">
    {{ t.status }}
  </div>


  <div *ngIf="this.transactions.length === 0">
    <h2> No Transactions exists</h2>
  </div>

</div>
