<div class="dashboard-container">
  <div class="card emerald-card">
    <div class="card-header">
      <h3>Send Money</h3>
    </div>

    <!-- From Account -->
    <label>From Account</label>
    <input 
      type="text" 
      [value]="'Savings Account (₹2,18,600)'" 
      disabled
    >

    <!-- Beneficiary -->
    <label>Select Beneficiary</label>
    <select [(ngModel)]="selectedUser">
      <option value="">-- Select User --</option>
      <option *ngFor="let user of users" [value]="user.name">
        {{ user.name }}
      </option>
    </select>

    <!-- Amount -->
    <label>Amount</label>
    <input type="number" [(ngModel)]="amount" placeholder="Enter amount">

    <!-- Note -->
    <label>Note (optional)</label>
    <input type="text" [(ngModel)]="note" placeholder="Add note">

    <!-- Button -->
    <button (click)="goToPin()">Enter PIN</button>
  </div>
</div>
