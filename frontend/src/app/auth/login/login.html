<div class="main-container">

    
  <div class="top-logo">
    <img src="/sobp.png" alt="logo">
  </div>

  <div class="auth-container">

  <div class="card">

    <!-- LEFT -->
    <div class="left">

    

      <h2>Login</h2>

      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Enter your email">

      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Enter your password">

      <p class="forgot" routerLink="/forgot-password">
  Forgot password?
</p>

      <div class="remember">
        <input type="checkbox" id="remember">
   <p>Keep me logged in</p>
      </div>

      <button class="login-btn" (click)="login()">Login</button>

      

     

    </div>

    <!-- RIGHT -->
    <div class="right">
      <div class="overlay">
        <h1>Welcome Back!</h1>
        <p>To keep connected with us please login with your personal info</p>

        <button routerLink="/register">Sign Up</button>
      </div>
    </div>

  </div>

</div>
