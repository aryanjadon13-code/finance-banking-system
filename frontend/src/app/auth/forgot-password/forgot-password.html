<div class="main-container">
     <div class="card">
          <h2>Forgot Password</h2>

          <p class="desc"> We will send you an email containing a link that allows you to reset your password.</p>
      
       <label>Email</label>

          <input 
          type="email"
          placeholder="Enter your email"
          [(ngModel)]="email">

          <button (click)="sendotp">Forgot Password</button>
           <p class="back" routerLink="/login">Back to Login</p>
     </div>
</div>
